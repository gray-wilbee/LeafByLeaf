{% extends "base.html" %}
{% block title %}Entry not found — Journal{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Entry not found</h1>
</div>
<div class="empty-state">
  <p>The entry <code style="font-family: var(--mono); font-size: 14px;">{{ entry_id }}</code> could not be loaded.</p>
  <p class="empty-hint" style="margin-top: 12px;">It may have been deleted or the data may be missing from the journal file.</p>
  <p style="margin-top: 24px;"><a href="{{ url_for('index') }}" style="color: var(--accent); text-decoration: none; font-family: var(--mono); font-size: 12px; letter-spacing: 0.3px;">← Back to journal</a></p>
</div>
{% endblock %}
