<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaf by Leaf — Sign in</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <meta name="theme-color" content="#3F5B46">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&family=Sacramento&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #F2E9DD;
      --paper:        #FBF6EE;
      --ink:          #2B2B2B;
      --ink-2:        #5C5851;
      --ink-3:        #8A8378;
      --rule:         #D9CFBE;
      --accent:       #3F5B46;
      --accent-hover: #2E4434;
      --error:        #B0432A;
      --serif: "Playfair Display", Georgia, serif;
      --sans:  "Lora", Georgia, serif;
      --mono:  "JetBrains Mono", monospace;
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 340px;
      padding: 48px 40px;
    }
    .auth-logo {
      display: block;
      width: 200px;
      mix-blend-mode: multiply;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 8px;
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      padding: 9px 12px;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 140ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: var(--paper);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      padding: 11px;
      margin-top: 4px;
      transition: background 140ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    button:hover { background: var(--accent-hover); }
    .error {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--error);
      margin-bottom: 16px;
      padding: 8px 0;
      border-bottom: 1px solid #E8C4BA;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="{{ url_for('static', filename='logo-primary-lockup-stacked.png') }}" alt="Leaf by Leaf" class="auth-logo">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" autofocus>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
    <p style="display:block;text-align:center;margin-top:20px;font-family:var(--sans);font-size:13px;color:var(--ink-3)">
      New here? <a href="{{ url_for('register') }}" style="color:var(--accent);text-decoration:none">Create account</a>
    </p>
  </div>
</body>
</html>
